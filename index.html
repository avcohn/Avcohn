
<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>קצובות לינה - מהדורה 22</title>
<style>
body { font-family: Arial; direction: rtl; margin: 20px; background:#f5f5f5;}
h1 { text-align:center; }
table { border-collapse: collapse; width: 100%; background:white; }
th, td { border:1px solid #ddd; padding:8px; text-align:center;}
th { background:#2c3e50; color:white;}
tr:nth-child(even){background:#f2f2f2;}
input { width:100%; padding:10px; margin-bottom:10px; font-size:16px;}
</style>
</head>
<body>

<h1>קצובות לינה - מהדורה 22</h1>
<input type="text" id="search" placeholder="חפש מדינה או עיר..." onkeyup="filterTable()">

<table id="table">
<tr>
<th>מדינה</th>
<th>עיר</th>
<th>מטבע</th>
<th>קצובה</th>
</tr>

<tr><td>France</td><td>Paris</td><td>EUR</td><td>320</td></tr>
<tr><td>Italy</td><td>כל המדינה</td><td>EUR</td><td>295</td></tr>
<tr><td>Spain</td><td>כל המדינה</td><td>EUR</td><td>270</td></tr>
<tr><td>USA</td><td>New York</td><td>USD</td><td>520</td></tr>
<tr><td>Germany</td><td>כל המדינה</td><td>EUR</td><td>180</td></tr>

</table>

<script>
function filterTable() {
  var input = document.getElementById("search");
  var filter = input.value.toUpperCase();
  var table = document.getElementById("table");
  var tr = table.getElementsByTagName("tr");

  for (var i = 1; i < tr.length; i++) {
    var td1 = tr[i].getElementsByTagName("td")[0];
    var td2 = tr[i].getElementsByTagName("td")[1];
    if (td1 || td2) {
      var txtValue = td1.textContent || td1.innerText;
      var txtValue2 = td2.textContent || td2.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1 || txtValue2.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}
</script>

</body>
</html>
